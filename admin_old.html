<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blaze Earn | Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .dashboard-container {
            width: 100%;
            max-width: 1000px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .dashboard-header h1 {
            font-size: 1.5rem;
            color: var(--primary-foreground);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
            color: var(--foreground);
        }

        th {
            font-weight: 600;
            color: var(--muted-foreground);
            background: rgba(255, 255, 255, 0.02);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .badge {
            background: var(--primary);
            color: var(--primary-foreground);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        #authOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-box {
            background: var(--card);
            padding: 2rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .auth-box h2 {
            margin-bottom: 1rem;
            color: var(--foreground);
        }

        .auth-box input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--input);
            border-radius: 6px;
            color: white;
            outline: none;
        }
        
        .auth-box button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--muted-foreground);
            padding: 1rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--primary-foreground);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="page-wrapper" style="align-items: flex-start;">
        <div class="dashboard-container">
            <div class="dashboard-header">
                <h1>Blaze Earn Admin</h1>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('users')">Users</button>
                <button class="tab-btn" onclick="switchTab('coupons')">Coupons</button>
            </div>

            <div id="usersTab" class="tab-content active">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                    <h2>Registered Users</h2>
                    <span class="badge" id="totalUsers">0 Users</span>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Referred By</th>
                                <th>Joined Date</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <!-- Rows will be populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="couponsTab" class="tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2>Activation Coupons</h2>
                    <button class="action-btn" onclick="generateCoupon()">+ Generate New Coupon</button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Coupon Code</th>
                                <th>Status</th>
                                <th>Used By</th>
                                <th>Generated Date</th>
                            </tr>
                        </thead>
                        <tbody id="couponsTableBody">
                            <!-- Rows will be populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Auth Overlay -->
    <div id="authOverlay">
        <div class="auth-box">
            <h2>Admin Login</h2>
            <input type="password" id="adminPassword" placeholder="Enter Admin Password">
            <button onclick="attemptLogin()">Login</button>
            <p id="loginError" style="color: var(--destructive); font-size: 0.8rem; margin-top: 0.5rem; display: none;">Invalid password</p>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
